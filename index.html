<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ពិធីបំពាក់ចិញ្ចៀន - ហួកាំង ថារ៉ា & ខេន លីដា</title>
    <link href="https://fonts.googleapis.com/css2?family=Moul&family=Hanuman:wght@400;700&family=Freehand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ring-container">
        <div class="khmer-art-header">
            <img src="https://github.com/tharahuokaing/weeding/blob/main/weeding.png?raw=true" alt="Wedding Header Ornament">
        </div>

        <h1 class="title-moul">កិច្ចសិរីមង្គលបំពាក់ចិញ្ចៀន</h1>
        <p class="ceremony-subtitle">Ring Exchange & Blessing Ceremony</p>

        <div class="couple-box">
            <div class="groom-side">
                <span class="label">កូនកំលោះ</span>
                <span class="name">ហួកាំង ថារ៉ា</span>
            </div>
            <div class="ring-icon">💍</div>
            <div class="bride-side">
                <span class="label">កូនក្រមុំ</span>
                <span class="name">ខេន លីដា</span>
            </div>
        </div>

        <div class="ceremony-description">
            <p>
                ពិធីបំពាក់ចិញ្ចៀនការ គឺជាកិច្ចសន្យាចិត្ត និងជាសក្ខីភាពនៃទំព័រជីវិតថ្មីរបស់គូស្វាមីភរិយាថ្មី ដោយមានការដឹងឮ និងប្រសិទ្ធពរជ័យពីសំណាក់មាតាបិតាទាំងសងខាង ព្រមទាំងញាតិមិត្តជិតឆ្ងាយទាំងអស់។
            </p>
        </div>

        <div class="action-section">
            <button class="btn-ring-ceremony" onclick="toggleRingCeremony()">
                💖 ចុចទីនេះដើម្បីមើលទិដ្ឋភាព និងស្តាប់ «ភ្លេងការបំពាក់ចិញ្ចៀន»
            </button>
        </div>

        <div class="khmer-art-footer">
            <img src="https://github.com/tharahuokaing/weeding/blob/main/weeding_footer.png?raw=true" alt="Wedding Footer Ornament">
        </div>
    </div>

    <script src="script.js"></script>
    <script src="script1.js"></script>
</body>
</html>
